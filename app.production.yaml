services:
- name: web
  source:
    type: github
    repo: YOUR_GITHUB_USERNAME/website
    branch: main
    deploy_on_push: true
  build_command: npm ci && npm run build
  run_command: npx serve -s dist -l 8080
  environment_slug: node-js-20
  envs:
  - key: NODE_ENV
    scope: RUN_AND_BUILD
    value: production
  - key: NODE_OPTIONS
    scope: RUN_AND_BUILD
    value: --max-old-space-size=512
  health_check:
    http_path: /index.html
    initial_delay_seconds: 10
    period_seconds: 10
    timeout_seconds: 5
    failure_threshold: 3
  http_port: 8080
  cors:
    allow_origins:
    - exact: https://yourdomain.com
    - exact: https://www.yourdomain.com
  log_destination_ref: logs

ingress:
  rules:
  - match:
      path:
        prefix: /
    component:
      name: web
  - match:
      header:
        key: Host
        op: exact
        values:
        - yourdomain.com
    component:
      name: web

log_destinations:
  logs:
    name: logs
    type: papertrail
