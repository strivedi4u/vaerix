<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" width="900" height="1100">
  <title>VAELRIX — Master Stacked Lockup (Signature Glyphs)</title>
  <desc>Hero lockup with crowned-V mark above and signature VAELRIX wordmark (V + X as custom glyphs) below.</desc>
  <rect width="900" height="1100" fill="#F5F1E8"/>

  <!-- Primary crowned V mark, large, centered -->
  <g transform="translate(450 360) scale(0.56)">
    <g transform="translate(-500 -500)">
      <g fill="#C5A35A">
        <rect x="269" y="219" width="22" height="22" transform="rotate(45 280 230)"/>
        <rect x="483" y="183" width="34" height="34" transform="rotate(45 500 200)"/>
        <rect x="709" y="219" width="22" height="22" transform="rotate(45 720 230)"/>
      </g>
      <path d="M 280 310 L 500 790 L 720 310"
            fill="none" stroke="#0A0A0A" stroke-width="52"
            stroke-linecap="square" stroke-linejoin="miter"/>
    </g>
  </g>

  <!-- Gold divider -->
  <line x1="320" y1="700" x2="580" y2="700" stroke="#C5A35A" stroke-width="1.2"/>

  <!-- Signature wordmark: V (glyph) + AELRI (text) + X (glyph) -->
  <g transform="translate(85 780)">
    <!-- V glyph crown -->
    <g fill="#C5A35A">
      <rect x="93" y="76" width="10" height="10" transform="rotate(45 98 81)"/>
      <rect x="193" y="56" width="14" height="14" transform="rotate(45 200 63)"/>
      <rect x="297" y="76" width="10" height="10" transform="rotate(45 302 81)"/>
    </g>
    <!-- V glyph strokes -->
    <path d="M 98 115 L 200 226 L 302 115"
          fill="none" stroke="#0A0A0A" stroke-width="14"
          stroke-linecap="square" stroke-linejoin="miter"/>
    <!-- AELRI text -->
    <text x="365" y="226"
          font-family="'Cormorant Garamond', 'EB Garamond', Georgia, serif"
          font-size="150" font-weight="500" fill="#0A0A0A"
          letter-spacing="26">AELRI</text>
    <!-- X glyph -->
    <g stroke-linecap="square" fill="none">
      <path d="M 628 115 L 730 226" stroke="#C5A35A" stroke-width="14"/>
      <path d="M 730 115 L 628 226" stroke="#0A0A0A" stroke-width="2"/>
    </g>
  </g>

  <!-- Tagline -->
  <text x="450" y="1040"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="20" font-style="italic" fill="#C5A35A"
        text-anchor="middle" letter-spacing="11">Dressed to Reign</text>

  <!-- Heritage line -->
  <text x="450" y="1075"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="11" fill="#2B2B2B"
        text-anchor="middle" letter-spacing="9">EST · MMXXVI · INDIA</text>
</svg>
